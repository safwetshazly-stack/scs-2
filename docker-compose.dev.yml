version: '3.9'

# Development override - hot reload enabled
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scs_platform_dev
      POSTGRES_USER: scs_user
      POSTGRES_PASSWORD: devpassword
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - scs_dev

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_dev_data:/data
    networks:
      - scs_dev

  backend:
    build:
      context: ./backend
      target: dev
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://scs_user:devpassword@postgres:5432/scs_platform_dev
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret-not-for-production
      JWT_REFRESH_SECRET: dev-refresh-secret-not-for-production
      FRONTEND_URL: http://localhost:3000
    ports:
      - '4000:4000'
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      - postgres
      - redis
    networks:
      - scs_dev

  frontend:
    build:
      context: ./frontend
      target: dev
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_WS_URL: http://localhost:4000
    ports:
      - '3000:3000'
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - scs_dev

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  scs_dev:
    driver: bridge
