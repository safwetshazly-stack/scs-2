apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: random-api-pod-kill
  namespace: default
spec:
  action: pod-kill
  mode: random-one
  selector:
    labelSelectors:
      app: scs-api
  duration: '10s'
  scheduler:
    cron: '@every 10m'
---
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: redis-latency-injection
  namespace: default
spec:
  action: delay
  mode: all
  selector:
    labelSelectors:
      app: redis
  delay:
    latency: '500ms'
    correlation: '100'
    jitter: '50ms'
  duration: '5m'
  scheduler:
    cron: '@every 30m'
---
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: kafka-downtime
  namespace: default
spec:
  action: partition
  mode: all
  selector:
    labelSelectors:
      app: kafka
  direction: both
  duration: '1m'
  scheduler:
    cron: '@every 1h'
