apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: default
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: scs-secrets-external
  namespace: default
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: scs-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: scs/production/database
        property: DATABASE_URL
    - secretKey: JWT_ACCESS_SECRET
      remoteRef:
        key: scs/production/auth
        property: JWT_ACCESS_SECRET
    - secretKey: REDIS_URL
      remoteRef:
        key: scs/production/redis
        property: REDIS_URL
