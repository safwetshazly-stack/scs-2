apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: default
spec:
  schedule: "0 */6 * * *" # Every 6 hours
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: pg-backup
            image: postgres:15-alpine
            envFrom:
              - secretRef:
                  name: scs-secrets
            env:
              - name: AWS_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: aws-s3-secrets
                    key: access-key
              - name: AWS_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: aws-s3-secrets
                    key: secret-key
            command:
            - /bin/sh
            - -c
            - |
              TIMESTAMP=$(date +%Y%m%d%H%M%S)
              pg_dump $DATABASE_URL -F c -f /tmp/db_backup_$TIMESTAMP.dump
              # Assuming aws-cli is installed in the container
              # aws s3 cp /tmp/db_backup_$TIMESTAMP.dump s3://scs-database-backups/
          restartPolicy: OnFailure
