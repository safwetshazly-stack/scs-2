version: '3.9'

services:
  # ─── DATABASE ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: scs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scs_platform
      POSTGRES_USER: scs_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scs_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scs_user -d scs_platform']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scs_network

  # ─── REDIS ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: scs_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-scs_redis_pass} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scs_network

  # ─── BACKEND ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scs_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://scs_user:${POSTGRES_PASSWORD:-scs_secure_password}@postgres:5432/scs_platform
      REDIS_URL: redis://:${REDIS_PASSWORD:-scs_redis_pass}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - scs_network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── FRONTEND ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    container_name: scs_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - scs_network

  # ─── NGINX ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: scs_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - scs_network

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  scs_network:
    driver: bridge
