version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: scs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: 
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/scs_db?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - PORT=4000
      - JWT_ACCESS_SECRET=your_super_secret_jwt_access_key
      - JWT_REFRESH_SECRET=your_super_secret_jwt_refresh_key
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  redis_data:
